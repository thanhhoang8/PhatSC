
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Sphere</title>

<style>
body{
margin:0;
overflow:hidden;
background: radial-gradient(circle at bottom,#2d1b4e,#0a0512);
font-family:sans-serif;
}

#sphere-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.element{
width:200px;
height:200px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 15px pink;
}

.element img{
width:100%;
height:100%;
object-fit:cover;
}
</style>

</head>
<body>

<div id="sphere-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

var camera, scene, renderer, controls;
var objects = [];
var targets = { sphere: [] };

init();
animate();

function init(){

camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight,1,10000);
camera.position.z = 3000;

scene = new THREE.Scene();

var images=[
"https://picsum.photos/400/400?1",
"https://picsum.photos/400/400?2",
"https://picsum.photos/400/400?3",
"https://picsum.photos/400/400?4",
"https://picsum.photos/400/400?5"
];

var total=120;

for(let i=0;i<total;i++){

let div=document.createElement("div");
div.className="element";

let img=document.createElement("img");
img.src=images[i%images.length];

div.appendChild(img);

let object=new THREE.CSS3DObject(div);

object.position.x=Math.random()*4000-2000;
object.position.y=Math.random()*4000-2000;
object.position.z=Math.random()*4000-2000;

scene.add(object);
objects.push(object);

}

var vector=new THREE.Vector3();
var spherical=new THREE.Spherical();
var radius=800;

for(let i=0;i<objects.length;i++){

let phi=Math.acos(-1+(2*i)/objects.length);
let theta=Math.sqrt(objects.length*Math.PI)*phi;

let obj=new THREE.Object3D();

spherical.set(radius,phi,theta);
obj.position.setFromSpherical(spherical);

vector.copy(obj.position).multiplyScalar(2);
obj.lookAt(vector);

targets.sphere.push(obj);

}

renderer=new THREE.CSS3DRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);

document.getElementById("sphere-container").appendChild(renderer.domElement);

controls=new THREE.TrackballControls(camera,renderer.domElement);
controls.rotateSpeed=0.5;

transform(targets.sphere,2000);

window.addEventListener("resize",onResize);

}

function transform(targets,duration){

for(let i=0;i<objects.length;i++){

let object=objects[i];
let target=targets[i];

new TWEEN.Tween(object.position)
.to({x:target.position.x,y:target.position.y,z:target.position.z},duration)
.easing(TWEEN.Easing.Exponential.InOut)
.start();

new TWEEN.Tween(object.rotation)
.to({x:target.rotation.x,y:target.rotation.y,z:target.rotation.z},duration)
.easing(TWEEN.Easing.Exponential.InOut)
.start();

}

}

function onResize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

}

function animate(){

requestAnimationFrame(animate);

TWEEN.update();
controls.update();

scene.rotation.y+=0.002;

renderer.render(scene,camera);

}

</script>

</body>
</html>
