<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Sphere - 8/3 Special</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b0a2e, #05020a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Lớp phủ chữ mở đầu */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #05020a;
            transition: opacity 1s ease;
        }

        #intro-text {
            font-size: 2.5rem;
            color: #ff4d8d;
            text-align: center;
            text-shadow: 0 0 20px #ff4d8d;
            font-weight: bold;
        }

        #sphere-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .element {
            width: 140px;
            height: 180px;
            box-shadow: 0 0 15px rgba(255, 77, 141, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: #222;
        }

        .element img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Lời chúc cuối */
        #final-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(255, 77, 141, 0.8);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #final-card.show {
            transform: translate(-50%, -50%) scale(1);
        }

        button {
            background: #ff4d8d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div id="intro-text">Đang tải...</div>
</div>

<div id="sphere-container"></div>

<div id="final-card">
    <h2 style="color: #ff4d8d;">Happy Women's Day!</h2>
    <p>Chúc em luôn xinh đẹp, hạnh phúc và rạng rỡ như những bông hoa. Yêu em rất nhiều! ❤️</p>
    <button onclick="document.getElementById('final-card').classList.remove('show')">Đóng</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>
    const overlay = document.getElementById('intro-overlay');
    const introText = document.getElementById('intro-text');
    const messages = ["Chúc mừng", "Ngày Quốc tế Phụ nữ", "Gửi Bé iu của anh..."];
    
    let camera, scene, renderer, controls;
    let objects = [];
    let targets = { sphere: [] };

    // BƯỚC 1: Hiệu ứng chữ chạy ngay khi mở web
    async function startExperience() {
        for (let msg of messages) {
            introText.style.opacity = 0;
            await new Promise(r => setTimeout(r, 500));
            introText.innerText = msg;
            introText.style.opacity = 1;
            introText.style.transition = 'opacity 0.8s';
            await new Promise(r => setTimeout(r, 2000));
        }
        
        // Ẩn lớp phủ đen
        overlay.style.opacity = 0;
        setTimeout(() => overlay.style.display = 'none', 1000);
        
        // Khởi tạo 3D
        init3D();
        animate();
    }

    function init3D() {
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 2500;
        scene = new THREE.Scene();

        // Ảnh mẫu (Bạn nên thay bằng link ảnh thật của bạn)
        const images = [
            "https://picsum.photos/300/400?random=1",
            "https://picsum.photos/300/400?random=2",
            "https://picsum.photos/300/400?random=3",
            "https://picsum.photos/300/400?random=4"
        ];

        const total = 60; // Số lượng ảnh
        for (let i = 0; i < total; i++) {
            const div = document.createElement('div');
            div.className = 'element';
            
            const img = document.createElement('img');
            img.src = images[i % images.length];
            div.appendChild(img);

            const object = new THREE.CSS3DObject(div);
            // Bắt đầu từ vị trí ngẫu nhiên rất xa để tạo hiệu ứng bay vào
            object.position.x = Math.random() * 4000 - 2000;
            object.position.y = Math.random() * 4000 - 2000;
            object.position.z = Math.random() * 4000 - 2000;
            
            scene.add(object);
            objects.push(object);

            // Tạo vị trí đích trên hình cầu
            const phi = Math.acos(-1 + (2 * i) / total);
            const theta = Math.sqrt(total * Math.PI) * phi;
            const target = new THREE.Object3D();
            target.position.setFromSphericalCoords(800, phi, theta);
            
            const vector = new THREE.Vector3();
            vector.copy(target.position).multiplyScalar(2);
            target.lookAt(vector);
            targets.sphere.push(target);
        }

        renderer = new THREE.CSS3DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('sphere-container').appendChild(renderer.domElement);

        controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 0.5;

        // Chuyển động vào hình cầu
        transform(targets.sphere, 3000);
        
        // Sau 7 giây hiện thư chúc
        setTimeout(() => {
            document.getElementById('final-card').classList.add('show');
        }, 7000);
    }

    function transform(targetArray, duration) {
        for (let i = 0; i < objects.length; i++) {
            const object = objects[i];
            const target = targetArray[i];

            new TWEEN.Tween(object.position)
                .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration)
                .easing(TWEEN.Easing.Exponential.InOut)
                .start();

            new TWEEN.Tween(object.rotation)
                .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration)
                .easing(TWEEN.Easing.Exponential.InOut)
                .start();
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();
        controls.update();
        scene.rotation.y += 0.005; // Xoay chậm
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if(camera) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });

    // Chạy ngay
    startExperience();
</script>

</body>
</html>
